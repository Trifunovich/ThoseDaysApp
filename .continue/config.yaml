name: Local Config
version: 1.0.0
schema: v1

workspaceFolder: .

models:
  - name: Qwen3-Coder-Next
    provider: ollama
    model: qwen3-coder-next
    roles:
      - chat
      - edit

  - name: Qwen3-Coder 30B
    provider: ollama
    model: qwen3-coder:30b
    roles:
      - autocomplete
      - edit
      - apply

  - name: Qwen2.5-Coder 14B
    provider: ollama
    model: qwen2.5-coder:14b
    roles:
      - chat
      - edit

  - name: Nomic Embed
    provider: ollama
    model: nomic-embed-text:latest
    roles:
      - embed
