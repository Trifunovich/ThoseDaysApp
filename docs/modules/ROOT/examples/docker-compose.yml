# Rosella Rhythm — self-host stack: the app + its own PostgreSQL.
# Put a DB_PASSWORD in a .env file next to this, then: docker compose up -d
name: rosella

services:
  app:
    image: ghcr.io/trifunovich/thosedaysapp:prod
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: thosedays
      DB_USER: thosedays
      DB_PASSWORD: ${DB_PASSWORD:?set DB_PASSWORD in .env}
    ports:
      - "8080:8080"

  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: thosedays
      POSTGRES_PASSWORD: ${DB_PASSWORD:?set DB_PASSWORD in .env}
      POSTGRES_DB: thosedays
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U thosedays -d thosedays"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
